# App Store config for `shopify app deploy` (publishes webhooks incl. mandatory compliance).
# Sync with Dev Dashboard: same client_id, URLs, and scopes.

name = "SyncLyst"
client_id = "9689201284b5118b5ed9dc84416f3952"
application_url = "https://synclyst.app/shopify/launch"
embedded = false

[access_scopes]
scopes = "write_inventory,read_inventory,read_products,write_products"

[auth]
redirect_urls = [
  "https://synclyst-publishing-299567386855.us-central1.run.app/auth/shopify/callback",
]

[webhooks]
api_version = "2025-01"

# app/uninstalled → publishing (token cleanup can stay on the API host).
[[webhooks.subscriptions]]
topics = [ "app/uninstalled" ]
uri = "https://synclyst-publishing-299567386855.us-central1.run.app/webhooks/shopify/compliance"

# Mandatory GDPR topics → same host as application_url (synclyst.app). Shopify’s automated
# checks commonly validate this surface; HMAC uses SHOPIFY_API_SECRET on Vercel.
[[webhooks.subscriptions]]
compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
uri = "https://synclyst.app/api/shopify/webhooks/gdpr/compliance"
