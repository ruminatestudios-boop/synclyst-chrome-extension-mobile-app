<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SyncLyst®</title>
    <meta name="apple-mobile-web-app-title" content="SyncLyst" />
    <script>
      (function () {
        try {
          var ua = navigator.userAgent || "";
          var t = typeof navigator.maxTouchPoints === "number" ? navigator.maxTouchPoints : 0;
          if (
            /Android|iPhone|iPad|iPod/i.test(ua) ||
            (t > 0 && /Macintosh/i.test(ua)) ||
            t > 1
          ) {
            document.title = "SyncLyst";
          }
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="/vendor/qrcode-generator.js"></script>
    <script src="/vendor/qrcode-expose.js"></script>
    <style>
      :root {
        --radius-btn-outline: 12px;
        --radius-session-card: 16px;
        --radius-snap-card: 20px;
        /* Production pairing UI: neutral light gray + white card (matches web mock). */
        --snap-page-bg: #e7e8ec;
        --snap-fg: #0f172a;
        --snap-fg-muted: #6b7280;
        --snap-input-border: #0f172a;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        background: var(--snap-page-bg);
        color: #1f2937;
      }
      body.snap--pair-invalid {
        background: var(--snap-page-bg);
      }
      /* Photo upload on phone: full white canvas. */
      body.snap--mobile-min {
        background: #ffffff;
      }
      .wrap {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        /* Leave room for fixed support strip on the lavender background */
        padding: clamp(1.25rem, 4vh, 2.5rem) clamp(1rem, 4vw, 2.5rem)
          max(2.85rem, calc(1.25rem + env(safe-area-inset-bottom, 0px)));
      }
      .wrap.center {
        justify-content: center;
      }
      .snap-card {
        width: 100%;
        /* Phone: ~full width; tablet/desktop: grow up to a comfortable max */
        max-width: min(40rem, calc(100vw - 2rem));
        border-radius: var(--radius-snap-card);
        background: #ffffff;
        box-shadow: 0 2px 24px rgba(15, 23, 42, 0.08);
        padding: clamp(1.35rem, 2.5vw, 2.1rem) clamp(1.25rem, 3.5vw, 2.25rem);
        text-align: center;
      }
      .snap-card--invalid {
        position: relative;
        overflow: hidden;
        max-width: min(26rem, calc(100vw - 2rem));
        padding: clamp(1.5rem, 3.5vw, 2.25rem) clamp(1.5rem, 3.2vw, 1.9rem) clamp(1.75rem, 3vw, 2.1rem);
      }
      .snap-card__inner--invalid {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: stretch;
      }
      .pair-viewfinder {
        position: absolute;
        left: 50%;
        /* Sit behind the code field + CTA (scan frame metaphor). */
        top: 68%;
        transform: translate(-50%, -50%);
        width: min(88%, 220px);
        height: 140px;
        z-index: 0;
        pointer-events: none;
        color: rgba(15, 23, 42, 0.4);
        opacity: 0.5;
      }
      .pair-viewfinder__dashed {
        position: absolute;
        inset: 0;
        border: 1.5px dashed rgba(15, 23, 42, 0.2);
        border-radius: 3px;
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.4) inset;
      }
      .pair-viewfinder__corner {
        position: absolute;
        width: 1.1rem;
        height: 1.1rem;
        border: 0 solid currentColor;
      }
      .pair-viewfinder__corner--tl {
        top: -1px;
        left: -1px;
        border-top-width: 2.5px;
        border-left-width: 2.5px;
        border-top-left-radius: 2px;
      }
      .pair-viewfinder__corner--tr {
        top: -1px;
        right: -1px;
        border-top-width: 2.5px;
        border-right-width: 2.5px;
        border-top-right-radius: 2px;
      }
      .pair-viewfinder__corner--br {
        bottom: -1px;
        right: -1px;
        border-bottom-width: 2.5px;
        border-right-width: 2.5px;
        border-bottom-right-radius: 2px;
      }
      .pair-viewfinder__corner--bl {
        bottom: -1px;
        left: -1px;
        border-bottom-width: 2.5px;
        border-left-width: 2.5px;
        border-bottom-left-radius: 2px;
      }
      .pair-input {
        width: 100%;
        margin: 0;
        padding: 0.78rem 1rem;
        border-radius: var(--radius-btn-outline);
        border: 1.5px solid var(--snap-input-border);
        background: #fff;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.8125rem;
        color: var(--snap-fg);
        text-align: left;
        line-height: 1.4;
        outline: none;
        transition: box-shadow 0.15s, border-color 0.15s;
      }
      .pair-input::placeholder {
        color: #9ca3af;
      }
      .pair-input:focus {
        border-color: #0a0a0a;
        box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.1);
      }
      .sub.sub--pair-invalid {
        font-size: clamp(0.8125rem, 0.78rem + 0.35vw, 0.9rem);
        color: var(--snap-fg-muted);
        margin: 0.65rem 0 0;
        line-height: 1.5;
        text-align: center;
        max-width: 100%;
      }
      .snap-card input#pair-code {
        text-align: left;
      }
      @media (min-width: 768px) {
        .snap-card {
          box-shadow: 0 4px 36px rgba(15, 23, 42, 0.08);
        }
      }
      .brand-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        margin-bottom: 1rem;
      }
      .brand-text {
        width: 100%;
        text-align: center;
      }
      .brand-text .brand-name {
        font-size: clamp(0.8125rem, 0.75rem + 0.35vw, 0.9375rem);
        font-weight: 700;
        color: #111827;
        letter-spacing: -0.02em;
        line-height: 1.2;
        margin: 0;
      }
      .brand-text .brand-name sup {
        font-size: 0.55em;
        font-weight: 400;
        opacity: 0.85;
        vertical-align: super;
        line-height: 0;
      }
      .brand-text .brand-meta {
        font-size: clamp(0.6875rem, 0.65rem + 0.2vw, 0.8125rem);
        color: #6b7280;
        margin: 0.15rem 0 0;
        line-height: 1.3;
      }
      h1 {
        font-size: clamp(0.9375rem, 0.85rem + 0.55vw, 1.125rem);
        font-weight: 700;
        letter-spacing: -0.02em;
        margin: 0 0 clamp(0.55rem, 1.2vw, 0.75rem);
        color: #111827;
        line-height: 1.25;
        text-align: center;
      }
      .sub {
        font-size: clamp(0.8125rem, 0.78rem + 0.35vw, 0.9375rem);
        color: #6b7280;
        margin: 0 auto clamp(1rem, 2vw, 1.35rem);
        line-height: 1.45;
        text-align: center;
        max-width: 36rem;
      }
      .session-panel {
        border: 1px solid #e5e7eb;
        border-radius: var(--radius-session-card);
        padding: 0.75rem 0.85rem 0.75rem;
        margin-bottom: 1rem;
        background: #fafafa;
      }
      .session-panel .session-label {
        font-size: 0.625rem;
        font-weight: 600;
        letter-spacing: 0.07em;
        color: #9ca3af;
        text-transform: uppercase;
        margin: 0 0 0.45rem;
        text-align: center;
      }
      .session-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
      }
      .session-panel .session-code {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.8125rem;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: #374151;
        font-variant-numeric: tabular-nums;
        margin: 0;
        line-height: 1.3;
        word-break: break-all;
        min-width: 0;
        flex: 1;
      }
      /* Match extension popup: big tap-to-copy session control. */
      .pair-copy {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.2rem;
        text-align: center;
        padding: 0.7rem 1rem;
        border-radius: 14px;
        border: 1px solid #d1d5db;
        background: #ffffff;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
        cursor: pointer;
        transition: border-color 0.15s, background 0.15s, box-shadow 0.15s, transform 0.1s;
      }
      .pair-copy:hover {
        border-color: #8b5cf6;
        background: #faf5ff;
        box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.12);
      }
      .pair-copy:active {
        transform: scale(0.99);
      }
      .pair-copy:focus-visible {
        outline: 2px solid #8b5cf6;
        outline-offset: 2px;
      }
      .pair-copy-code {
        font-size: 0.75rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-weight: 600;
        color: #111827;
        letter-spacing: 0.02em;
        word-break: break-all;
        line-height: 1.3;
      }
      .pair-copy-hint {
        font-size: 0.6875rem;
        font-weight: 500;
        color: #9ca3af;
      }
      .session-hint {
        font-size: clamp(0.55rem, 2.4vw, 0.625rem);
        color: #9ca3af;
        margin: 0.5rem 0 0;
        line-height: 1.35;
        text-align: center;
      }
      .session-panel .session-foot {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.35rem;
        margin-top: 0.65rem;
        padding-top: 0.65rem;
        border-top: 1px solid #e5e7eb;
        font-size: 0.6875rem;
        color: #9ca3af;
        line-height: 1.4;
        text-align: center;
      }
      .session-panel .session-foot svg {
        flex-shrink: 0;
        opacity: 0.85;
      }
      .snap-page-foot {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 5;
        padding: 0.65rem 1rem max(0.65rem, env(safe-area-inset-bottom, 0px));
        text-align: center;
        font-size: clamp(0.6rem, 2.5vw, 0.6875rem);
        color: #6b7280;
        line-height: 1.45;
        background: transparent;
        pointer-events: none;
      }
      .snap-page-foot .snap-support-link {
        pointer-events: auto;
      }
      .snap-support-link {
        color: #6b7280;
        font-weight: 500;
        text-decoration: underline;
        text-underline-offset: 2px;
      }
      .snap-support-link:hover {
        color: #374151;
      }
      body:not(.snap--pair-invalid) .snap-support-link {
        color: #7c3aed;
        font-weight: 600;
      }
      body:not(.snap--pair-invalid) .snap-support-link:hover {
        color: #6d28d9;
      }
      .photo-actions {
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 0.65rem;
        width: 100%;
      }
      .photo-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.45rem;
        width: 100%;
        padding: 0.78rem 1.25rem;
        min-height: 2.75rem;
        border-radius: var(--radius-btn-outline);
        font-family: inherit;
        font-size: 0.8125rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.1s, box-shadow 0.15s;
      }
      .photo-btn--upload {
        border: 1px solid #d1d5db;
        background: #ffffff;
        color: #374151;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
      }
      .photo-btn--upload:hover {
        border-color: #8b5cf6;
        background: #faf5ff;
        color: #5b21b6;
        box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.12);
      }
      .photo-btn--camera {
        border: 1px solid #0f172a;
        background: #111827;
        color: #fff;
      }
      .photo-btn--camera:hover {
        background: #000;
        border-color: #000;
      }
      .photo-btn:active {
        transform: scale(0.99);
      }
      .photo-btn:focus-visible {
        outline: 2px solid #8b5cf6;
        outline-offset: 3px;
      }
      .photo-btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }
      .photo-btn--secondary {
        border: 1px solid #e5e7eb;
        background: #ffffff;
        color: #6b7280;
      }
      .photo-btn--secondary:hover {
        border-color: #cbd5e1;
        background: #f8fafc;
        color: #334155;
        box-shadow: 0 0 0 3px rgba(148, 163, 184, 0.18);
      }
      .photo-btn svg {
        flex-shrink: 0;
        opacity: 0.95;
      }
      .photo-hint {
        font-size: clamp(0.55rem, 2.9vw, 0.625rem);
        color: #9ca3af;
        margin: 0.15rem 0 0;
        text-align: center;
        line-height: 1.35;
        white-space: normal;
      }
      input[type="file"] {
        position: absolute;
        left: -9999px;
        top: 0;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: 0;
        overflow: hidden;
        clip-path: inset(50%);
        white-space: nowrap;
        border: 0;
        opacity: 0;
        pointer-events: none;
      }
      /* Mobile: make the upload Snap page feel like a full-screen flow (no floating card). */
      @media (max-width: 520px) {
        body.snap--mobile-min {
          background: #ffffff;
        }
        .wrap {
          padding: 0;
          align-items: stretch;
        }
        .snap-card {
          max-width: 100%;
          min-height: 100vh;
          border-radius: 0;
          box-shadow: none;
          padding: max(1.1rem, env(safe-area-inset-top, 0px)) 1rem max(1.1rem, env(safe-area-inset-bottom, 0px));
          display: flex;
          flex-direction: column;
          justify-content: flex-start;
        }
        /* Pairing “invalid code” state: same centered card on gray as desktop mock. */
        body.snap--pair-invalid .wrap {
          padding: max(1.1rem, env(safe-area-inset-top, 0px)) 1.15rem
            max(1.1rem, env(safe-area-inset-bottom, 0px));
          align-items: center;
          justify-content: center;
        }
        body.snap--pair-invalid .snap-card--invalid {
          max-width: 100%;
          min-height: auto;
          min-height: min-content;
          border-radius: var(--radius-snap-card);
          box-shadow: 0 2px 24px rgba(15, 23, 42, 0.08);
          display: block;
        }
        body.snap--pair-invalid .pair-viewfinder {
          top: 66%;
          width: min(90%, 240px);
        }
        .brand-row {
          margin-bottom: 0.65rem;
        }
        h1 {
          margin-bottom: 0.55rem;
        }
        .sub {
          margin-bottom: 0.85rem;
        }
        .session-panel {
          margin-bottom: 0.85rem;
        }
        .photo-actions {
          gap: 0.75rem;
          margin-top: 0.65rem;
        }
        .photo-btn {
          min-height: 3.15rem;
          font-size: 0.9375rem;
          padding: 0.95rem 1.15rem;
        }
        .photo-btn--secondary {
          min-height: 2.7rem;
          font-size: 0.8125rem;
          padding: 0.7rem 1rem;
        }
        .snap-page-foot {
          position: static;
          padding: 0.75rem 1rem max(0.75rem, env(safe-area-inset-bottom, 0px));
          pointer-events: auto;
        }
      }
      /**
       * Phone: same /scan live camera + control bar as home.html (not two stacked pills).
       */
      body.snap--mobile-min .snap-session-desktop,
      body.snap--mobile-min .snap-page-foot,
      body.snap--mobile-min .phone-modal {
        display: none !important;
      }
      body.snap--mobile-min .wrap {
        padding: 0;
        align-items: stretch;
      }
      body.snap--mobile-min .snap-card {
        max-width: 100%;
        min-height: 100vh;
        min-height: 100dvh;
        border-radius: 0;
        box-shadow: none;
        padding: 0;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        gap: 0;
      }
      body:not(.snap--mobile-min) .snap-m-scan {
        display: none !important;
      }
      body.snap--mobile-min .snap-m-scan {
        display: flex !important;
        flex: 1;
        flex-direction: column;
        min-height: 0;
        width: 100%;
        background: #ffffff;
      }
      .snap-m-scan-header {
        flex-shrink: 0;
        width: 100%;
        box-sizing: border-box;
        border-bottom: 1px solid #e5e5e5;
        background: rgba(255, 255, 255, 0.95);
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
        padding: max(0.75rem, env(safe-area-inset-top, 0px)) 1rem 0.75rem;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        min-height: 3.5rem;
      }
      .snap-m-scan-logo {
        grid-column: 2;
        justify-self: center;
        text-decoration: none;
        color: #111;
        font-size: 1.125rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        line-height: 1.2;
      }
      .snap-m-scan-logo sup {
        font-size: 0.55em;
        font-weight: 400;
        opacity: 0.9;
        vertical-align: super;
        line-height: 0;
      }
      .snap-m-step-camera {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
        position: relative;
        background: #fff;
        padding: 0;
        justify-content: stretch;
        align-items: center;
      }
      /* From home.html / scan — matches synclyst.app/scan */
      .scan-camera-viewport {
        width: min(100%, 430px);
        flex: 1;
        min-height: 240px;
        border-radius: 0;
        border: none;
        box-shadow: none;
        position: relative;
        overflow: hidden;
      }
      .snap-m-scan .scan-camera-viewport {
        width: 100%;
        max-width: none;
        min-height: 0;
        background: #f4f4f5;
      }
      #snap-m-video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        min-height: 200px;
      }
      .scan-frame-guide {
        position: absolute;
        top: 50%;
        left: 50%;
        width: min(48vw, 180px);
        height: min(48vw, 180px);
        transform: translate(-50%, -52%);
        border: 1px dashed rgba(255, 255, 255, 0.45);
        border-radius: 16px;
        pointer-events: none;
        z-index: 2;
      }
      .scan-frame-guide::before,
      .scan-frame-guide::after {
        content: "";
        position: absolute;
        width: 30px;
        height: 30px;
        border: 2px solid rgba(255, 255, 255, 0.75);
        border-right: 0;
        border-bottom: 0;
      }
      .scan-frame-guide::before {
        top: 12px;
        left: 12px;
      }
      .scan-frame-guide::after {
        top: 12px;
        right: 12px;
        transform: scaleX(-1);
      }
      .snap-m-scan-err {
        display: none;
        text-align: center;
        color: #dc2626;
        font-size: 0.875rem;
        line-height: 1.4;
        margin: 1rem 1rem 0;
        max-width: 28rem;
        margin-left: auto;
        margin-right: auto;
        border-radius: 1rem;
        background: #fef2f2;
        border: 1px solid #fee2e2;
        padding: 0.75rem 0.9rem;
      }
      .snap-m-scan-err.is-visible {
        display: block;
      }
      body.snap--mobile-min .snap-m-scan-err.is-visible {
        position: absolute;
        left: 1rem;
        right: 1rem;
        bottom: 6.5rem;
        max-width: none;
        margin: 0;
        z-index: 30;
      }
      .scan-control-bar {
        width: min(100%, 430px);
        margin: 0 auto;
        padding: 0.85rem 1.1rem calc(0.9rem + env(safe-area-inset-bottom, 0px));
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 0.5rem;
        border-top: 1px solid #e5e5e5;
        background: rgba(255, 255, 255, 0.92);
        -webkit-backdrop-filter: blur(12px);
        backdrop-filter: blur(12px);
        flex-shrink: 0;
      }
      body.snap--mobile-min .scan-control-bar {
        width: 100%;
        max-width: none;
      }
      .scan-control-btn {
        width: 3rem;
        height: 3rem;
        min-width: 3rem;
        padding: 0;
        border: 1px solid rgba(228, 228, 231, 0.95);
        border-radius: 1rem;
        background: rgba(250, 250, 250, 0.85);
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);
        color: #18181b;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
        cursor: pointer;
      }
      .scan-control-bar > :first-child {
        justify-self: start;
      }
      .scan-cbar-c {
        display: flex;
        align-items: center;
        justify-content: center;
        justify-self: center;
      }
      .scan-control-bar > :last-child {
        justify-self: end;
      }
      .scan-control-btn:hover {
        background: rgba(244, 244, 245, 0.95);
        border-color: #d4d4d8;
      }
      .scan-control-btn:active {
        transform: scale(0.96);
      }
      .scan-control-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        transform: none;
      }
      .scan-control-btn svg {
        display: block;
        width: 1.25rem;
        height: 1.25rem;
        stroke: currentColor;
        stroke-width: 1.75;
        fill: none;
      }
      .scan-capture-btn {
        width: 4.25rem;
